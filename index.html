<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Matrix TODO">
  <meta name="theme-color" content="#ffffff">
  <title>Matrix TODO - 할 일 관리</title>
  <meta name="description" content="아이젠하워 매트릭스로 할 일의 우선순위를 쉽게 정하세요">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ══════════════ SCREEN: MATRIX ══════════════ -->
  <div id="screen-matrix" class="screen active">
    <header class="screen-header">
      <button class="icon-btn" id="settings-btn" aria-label="설정">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <h1 class="screen-title">Matrix</h1>
      <div class="header-right">
        <button class="icon-btn open-quick-add" aria-label="할 일 추가" data-default-matrix="do">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="icon-btn" id="matrix-filter-btn" aria-label="필터">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        </button>
      </div>
    </header>

    <div class="matrix-axis-row">
      <div class="axis-col-spacer"></div>
      <div class="axis-label urgent">긴급함</div>
      <div class="axis-label not-urgent">긴급하지 않음</div>
    </div>
    <div id="sort-menu" class="sort-menu">
      <button class="sort-opt active" data-filter="incomplete">미완료</button>
      <button class="sort-opt" data-filter="complete">완료</button>
    </div>

    <div class="matrix-body">
      <div class="axis-label-row">
        <div class="row-axis-label important">중요함</div>
        <div class="row-axis-label not-important">중요하지 않음</div>
      </div>
      <div class="matrix-grid" id="matrix-grid">
        <div class="quadrant" id="q-do-panel" data-q="do">
          <div class="quadrant-header">
            <span class="q-label do">Do</span>
            <button class="q-add-btn open-quick-add" data-default-matrix="do" aria-label="Do에 추가">+</button>
          </div>
          <div class="q-tasks" id="q-do"></div>
        </div>
        <div class="quadrant" id="q-plan-panel" data-q="plan">
          <div class="quadrant-header">
            <span class="q-label plan">Plan</span>
            <button class="q-add-btn open-quick-add" data-default-matrix="plan" aria-label="Plan에 추가">+</button>
          </div>
          <div class="q-tasks" id="q-plan"></div>
        </div>
        <div class="quadrant" id="q-delegate-panel" data-q="delegate">
          <div class="quadrant-header">
            <span class="q-label delegate">Delegate</span>
            <button class="q-add-btn open-quick-add" data-default-matrix="delegate" aria-label="Delegate에 추가">+</button>
          </div>
          <div class="q-tasks" id="q-delegate"></div>
        </div>
        <div class="quadrant" id="q-eliminate-panel" data-q="eliminate">
          <div class="quadrant-header">
            <span class="q-label eliminate">Eliminate</span>
            <button class="q-add-btn open-quick-add" data-default-matrix="eliminate" aria-label="Eliminate에 추가">+</button>
          </div>
          <div class="q-tasks" id="q-eliminate"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════ SCREEN: DASHBOARD ══════════════ -->
  <div id="screen-dashboard" class="screen">
    <header class="screen-header">
      <h1 class="screen-title">대시보드</h1>
      <div class="header-right">
        <button class="icon-btn open-quick-add" aria-label="할 일 추가" data-default-matrix="do">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </header>
    <div id="status-tabs" class="status-tabs">
      <button class="stab active" data-status="incomplete">미완료</button>
      <button class="stab" data-status="complete">완료</button>
      <button class="stab" data-status="all">전체</button>
    </div>
    <div class="task-list" id="dashboard-list"></div>
  </div>

  <!-- ══════════════ SCREEN: CALENDAR ══════════════ -->
  <div id="screen-calendar" class="screen">
    <header class="screen-header">
      <h1 class="screen-title">Calendar</h1>
      <div class="header-right">
        <button class="icon-btn open-quick-add" aria-label="할 일 추가" data-default-matrix="do">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="icon-btn" aria-label="필터">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        </button>
      </div>
    </header>
    <div class="calendar-wrap">
      <div class="cal-nav">
        <button class="cal-arrow" id="cal-prev" aria-label="이전 달">&#8249;</button>
        <span class="cal-month-label" id="cal-month-label">2026년 4월</span>
        <button class="cal-arrow" id="cal-next" aria-label="다음 달">&#8250;</button>
      </div>
      <div class="cal-weekdays">
        <span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cal-day-tasks" id="cal-day-tasks">
        <p class="cal-day-label" id="cal-day-label"></p>
        <div class="task-list" id="cal-day-list" style="padding:0 0 8px;"></div>
      </div>
    </div>
  </div>

  <!-- ══════════════ SCREEN: STATS ══════════════ -->
  <div id="screen-stats" class="screen">
    <header class="screen-header">
      <h1 class="screen-title">Stats</h1>
    </header>
    <div class="stats-scroll" id="stats-container"></div>
  </div>

  <!-- ══════════════ SCREEN: MEMO ══════════════ -->
  <div id="screen-memo" class="screen">
    <div id="screen-memo-list" style="display:flex;flex-direction:column;height:100%">
      <header class="screen-header">
        <h1 class="screen-title" style="color:var(--plan)">메모</h1>
        <div class="header-right">
          <button class="icon-btn" id="memo-add-btn" aria-label="새 메모">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--plan)" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>
      </header>
      <div class="memo-scroll" id="memo-list-container">
        <!-- Memo cards populated here -->
      </div>
    </div>
    
    <div id="screen-memo-detail" style="display:none;flex-direction:column;height:100%">
      <header class="screen-header" style="justify-content:space-between">
        <button class="icon-btn" id="memo-back-btn" aria-label="뒤로" style="margin-left:-8px">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--plan)" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          <span style="color:var(--plan);font-size:16px;margin-left:4px">목록</span>
        </button>
        <button class="header-text-btn" id="memo-save-btn">확인</button>
      </header>
      <div class="memo-toolbar">
        <button data-cmd="bold"><b>B</b></button>
        <button data-cmd="italic"><i>I</i></button>
        <button data-cmd="strikeThrough"><s>S</s></button>
        <span class="tb-div"></span>
        <button data-cmd="insertUnorderedList">•</button>
        <button data-cmd="insertOrderedList">1.</button>
        <span class="tb-div"></span>
        <button data-cmd="indent">➡</button>
        <button data-cmd="outdent">⬅</button>
      </div>
      <div id="memo-content-area" class="memo-textarea" contenteditable="true" aria-placeholder="메모를 작성하세요..."></div>
    </div>
  </div>

  <!-- ══════════════ BOTTOM NAV ══════════════ -->
  <nav id="bottom-nav" role="navigation" aria-label="메인 네비게이션">
    <button class="nav-item active" data-tab="matrix" aria-label="매트릭스">
      <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5" fill="currentColor"/><rect x="13" y="3" width="8" height="8" rx="1.5" fill="currentColor" opacity=".4"/><rect x="3" y="13" width="8" height="8" rx="1.5" fill="currentColor" opacity=".25"/><rect x="13" y="13" width="8" height="8" rx="1.5" fill="currentColor" opacity=".15"/></svg>
      <span>매트릭스</span>
    </button>
    <button class="nav-item" data-tab="dashboard" aria-label="대시보드">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="4" rx="1.5" fill="currentColor" stroke="none"/><rect x="3" y="10" width="18" height="4" rx="1.5" fill="currentColor" stroke="none"/><rect x="3" y="17" width="12" height="4" rx="1.5" fill="currentColor" stroke="none"/></svg>
      <span>대시보드</span>
    </button>
    <button class="nav-item" data-tab="calendar" aria-label="캘린더">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg>
      <span>캘린더</span>
    </button>
    <button class="nav-item" data-tab="memo" aria-label="메모">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span>메모</span>
    </button>
    <button class="nav-item" data-tab="stats" aria-label="통계">
      <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="13" width="4" height="8" rx="1" fill="currentColor"/><rect x="10" y="8" width="4" height="13" rx="1" fill="currentColor"/><rect x="17" y="4" width="4" height="17" rx="1" fill="currentColor"/></svg>
      <span>통계</span>
    </button>
  </nav>

  <!-- ══════════════ QUICK ADD BOTTOM SHEET ══════════════ -->
  <div id="quick-add-sheet" class="bottom-sheet" role="dialog" aria-label="빠른 할 일 추가" aria-hidden="true">
    <div class="sheet-handle"></div>
    <div class="sheet-inner">
      <div class="sheet-topbar">
        <button class="sheet-close-btn" id="quick-close" aria-label="닫기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <button class="sheet-save-btn" id="quick-save" aria-label="저장">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
      </div>
      <input type="text" id="quick-title" class="quick-input" placeholder="할 일을 입력하세요..." maxlength="100" autocomplete="off">
      <div class="sheet-section">
        <p class="sheet-label">Matrix</p>
        <div class="m-selector" id="quick-matrix-sel">
          <button class="m-btn active" data-m="do"><div class="mini-mx-lg do"></div><span>실행</span></button>
          <button class="m-btn" data-m="plan"><div class="mini-mx-lg plan"></div><span>계획</span></button>
          <button class="m-btn" data-m="delegate"><div class="mini-mx-lg delegate"></div><span>위임</span></button>
          <button class="m-btn" data-m="eliminate"><div class="mini-mx-lg eliminate"></div><span>제거</span></button>
        </div>
      </div>
      <div class="sheet-section">
        <p class="sheet-label">Color Group</p>
        <div class="color-sel" id="quick-color-sel"></div>
      </div>
      <button class="full-add-link" id="open-full-add">+ 상세 입력</button>
    </div>
  </div>

  <!-- ══════════════ FULL ADD TASK MODAL ══════════════ -->
  <div id="full-add-modal" class="modal" role="dialog" aria-label="할 일 등록" aria-hidden="true">
    <div class="modal-header">
      <button class="modal-cancel" id="full-close" aria-label="취소">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <span class="modal-date-label" id="modal-date-label">날짜 선택</span>
      <button class="modal-confirm" id="full-save" aria-label="저장">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <input type="text" id="full-title" class="full-title-input" placeholder="할 일 내용" maxlength="200" autocomplete="off">
      </div>

      <div class="form-card">
        <p class="form-card-label">체크리스트</p>
        <div id="checklist-items"></div>
        <div class="checklist-add-row">
          <input type="text" id="checklist-input" class="checklist-input" placeholder="새 항목 추가...">
          <button class="checklist-add-btn" id="checklist-add" aria-label="항목 추가">+</button>
        </div>
      </div>

      <div class="form-card">
        <div class="form-card-header">
          <p class="form-card-label">매트릭스 영역</p>
          <span class="form-hint">중요함 ↕ 긴급함</span>
        </div>
        <div class="m-selector" id="full-matrix-sel">
          <button class="m-btn active" data-m="do"><div class="mini-mx-lg do"></div><span>실행</span></button>
          <button class="m-btn" data-m="plan"><div class="mini-mx-lg plan"></div><span>계획</span></button>
          <button class="m-btn" data-m="delegate"><div class="mini-mx-lg delegate"></div><span>위임</span></button>
          <button class="m-btn" data-m="eliminate"><div class="mini-mx-lg eliminate"></div><span>제거</span></button>
        </div>
      </div>

      <div class="form-card">
        <p class="form-card-label">컬러 그룹</p>
        <div class="color-sel" id="full-color-sel"></div>
      </div>

      <div class="form-card">
        <p class="form-card-label">할 일 유형</p>
        <div class="type-toggle">
          <button class="type-btn active" data-type="once" id="type-once">📅 한 번</button>
          <button class="type-btn" data-type="repeat" id="type-repeat">🔄 반복</button>
        </div>
      </div>

      <div id="once-settings" class="form-card">
        <div class="setting-row">
          <span class="setting-icon">📅</span>
          <span class="setting-label">날짜</span>
          <input type="date" id="task-date" class="setting-value-input">
        </div>
      </div>

      <div id="repeat-settings" class="form-card" style="display:none">
        <div class="setting-row">
          <span class="setting-icon">📅</span>
          <span class="setting-label">시작일</span>
          <input type="date" id="repeat-start" class="setting-value-input">
        </div>
        <div class="setting-row" style="margin-top:10px">
          <span class="setting-icon">📅</span>
          <span class="setting-label">종료일</span>
          <input type="date" id="repeat-end" class="setting-value-input">
        </div>
        <p class="form-card-label" style="margin-top:16px">반복 요일</p>
        <div class="day-sel" id="day-sel">
          <button class="day-btn" data-day="Mon">월</button>
          <button class="day-btn" data-day="Tue">화</button>
          <button class="day-btn" data-day="Wed">수</button>
          <button class="day-btn" data-day="Thu">목</button>
          <button class="day-btn" data-day="Fri">금</button>
          <button class="day-btn" data-day="Sat">토</button>
          <button class="day-btn" data-day="Sun">일</button>
        </div>
        <div class="setting-row" style="margin-top:16px">
          <span class="setting-icon">⏰</span>
          <span class="setting-label" style="flex:1">알림 시간
            <span style="display:block;font-size:10px;color:#9BA3AF;margin-top:2px;font-weight:400">(앱이 켜져있을 때만 울림)</span>
          </span>
          <label class="toggle-switch">
            <input type="checkbox" id="notif-toggle">
            <span class="toggle-track"></span>
          </label>
        </div>
        <div id="notif-time-row" class="setting-row" style="margin-top:10px; display:none">
          <input type="time" id="notif-time" class="setting-value-input" style="margin-left:auto">
        </div>
      </div>
    </div>
  </div>

  <!-- TASK DETAIL PANEL -->
  <div id="task-detail-modal" class="modal" role="dialog" aria-label="할 일 상세" aria-hidden="true">
    <div class="modal-header">
      <button class="modal-cancel" id="detail-close" aria-label="닫기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <span class="modal-date-label" id="detail-date-label"></span>
      <button class="modal-confirm" id="detail-save" aria-label="저장">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>

  <!-- ROUTINE DETAIL MODAL -->
  <div id="routine-modal" class="modal" role="dialog" aria-label="루틴 진행률" aria-hidden="true">
    <div class="modal-header">
      <button class="modal-cancel" id="routine-close" aria-label="닫기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <span class="modal-date-label" id="routine-title-lbl">루틴 진행률</span>
      <button class="modal-confirm" id="routine-edit-btn" aria-label="상세 설정">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </div>
    <div class="modal-body" id="routine-body"></div>
  </div>

  <!-- OVERLAY -->
  <div id="overlay" class="overlay"></div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
